<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { scale: 1 };
  componentDidMount() { this.fit(); this._r = () => this.fit(); window.addEventListener('resize', this._r); }
  componentWillUnmount() { window.removeEventListener('resize', this._r); }
  fit() { this.setState({ scale: Math.min(window.innerWidth / 1600, window.innerHeight / 900) }); }
  renderVals() { return { boardScale: this.state.scale }; }
}
