<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&family=Gochi+Hand&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box}</style>
</helmet>
<div style="position:relative;width:100%;height:100%;border-radius:6px;background:#fbfaf3;border:1.5px solid #2b2b2b;box-shadow:0 2px 3px rgba(0,0,0,.28);overflow:visible;font-family:'Gochi Hand',cursive">
  <sc-if value="{{ faceUp }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute;top:{{ cOff }};left:{{ cOffX }};display:flex;flex-direction:column;align-items:center;line-height:.82;color:{{ suitColor }}">
      <span style="font-size:{{ rankSize }};font-weight:700">{{ rank }}</span>
      <span style="font-size:{{ suitSize }}">{{ suit }}</span>
    </div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:{{ pipSize }};color:{{ suitColor }};opacity:.82">{{ suit }}</div>
    <div style="position:absolute;bottom:{{ cOff }};right:{{ cOffX }};transform:rotate(180deg);display:flex;flex-direction:column;align-items:center;line-height:.82;color:{{ suitColor }}">
      <span style="font-size:{{ rankSize }};font-weight:700">{{ rank }}</span>
      <span style="font-size:{{ suitSize }}">{{ suit }}</span>
    </div>
  </sc-if>
  <sc-if value="{{ faceDown }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:3px;border-radius:4px;border:2px solid #f4efe0;background-color:#b8503f;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.14) 0 5px,transparent 5px 11px),repeating-linear-gradient(-45deg,rgba(0,0,0,.10) 0 5px,transparent 5px 11px);display:flex;align-items:center;justify-content:center">
      <span style="font-family:'Permanent Marker',cursive;color:#f7f2e2;font-size:{{ starSize }};transform:rotate(-9deg);text-shadow:1px 1px 0 rgba(0,0,0,.25)">★</span>
    </div>
  </sc-if>
  <sc-if value="{{ hasSticker }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:-9px;right:-8px;transform:rotate(-7deg);background:{{ stickerBg }};color:#241f16;font-family:'Permanent Marker',cursive;font-size:{{ stickerSize }};line-height:1.05;padding:3px 6px 4px;border-radius:3px;box-shadow:1px 2px 3px rgba(0,0,0,.3);max-width:70px;text-align:center;z-index:5">
      {{ sticker }}
      <span style="position:absolute;bottom:-3px;left:-3px;width:9px;height:9px;background:linear-gradient(135deg,transparent 50%,rgba(0,0,0,.28) 50%)"></span>
    </div>
  </sc-if>
  <sc-if value="{{ hasConversion }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;bottom:-8px;left:-8px;transform:rotate(-6deg);font-family:'Permanent Marker',cursive;font-size:{{ convSize }};color:#2f6d4f;border:2px solid #2f6d4f;border-radius:14px;padding:2px 5px;background:rgba(247,244,233,.9);z-index:5;white-space:nowrap">{{ conversion }}</div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:66,&quot;height&quot;:92}}">
class Component extends DCLogic {
  renderVals() {
    const suit = this.props.suit || '♠';
    const isRed = suit === '♥' || suit === '♦';
    const faceDown = !!this.props.faceDown;
    const s = this.props.scale != null ? +this.props.scale : 1;
    const px = (v) => (Math.round(v * s * 10) / 10) + 'px';
    return {
      rank: this.props.rank || 'A',
      suit,
      suitColor: isRed ? '#c0392b' : '#242b3a',
      faceUp: !faceDown,
      faceDown,
      sticker: this.props.sticker || '',
      hasSticker: !faceDown && !!this.props.sticker,
      conversion: this.props.conversion || '',
      hasConversion: !faceDown && !!this.props.conversion,
      stickerBg: this.props.stickerColor || '#e8c24a',
      rankSize: px(15), suitSize: px(12), pipSize: px(33),
      starSize: px(20), stickerSize: px(7.5), convSize: px(8),
      cOff: px(3), cOffX: px(5),
    };
  }
}
</script>
</body>
</html>
